name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'  # еҢ№й…Қ v1.0.0, v1.8.5 зӯүж јејҸзҡ„ tag

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # йңҖиҰҒеҶҷе…Ҙжқғйҷҗд»ҘеҲӣе»ә Release
      actions: write   # еҲӣе»ә Release еҗҺжҳҫејҸи§ҰеҸ‘ Gitee й•ңеғҸеҗҢжӯҘ

    steps:
      - name: Checkout д»Јз Ғ
        uses: actions/checkout@v5

      - name: и®ҫзҪ® Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: е®үиЈ…дҫқиө–
        run: npm ci

      - name: жһ„е»әжҸ’д»¶
        run: npm run build:plugin

      - name: йӘҢиҜҒзүҲжң¬дёҖиҮҙжҖ§
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "вқҢ й”ҷиҜҜпјҡTag зүҲжң¬ ($TAG_VERSION) дёҺ package.json зүҲжң¬ ($PKG_VERSION) дёҚдёҖиҮҙ"
            exit 1
          fi

          echo "вң… зүҲжң¬йӘҢиҜҒйҖҡиҝҮпјҡ$TAG_VERSION"

      - name: жҸҗеҸ–еҪ“еүҚзүҲжң¬еҸ‘еёғиҜҙжҳҺ
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          awk -v heading="## ${TAG_NAME}" '
            $0 == heading { found = 1; next }
            found && /^## v[0-9]+\.[0-9]+\.[0-9]+/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "вқҢ й”ҷиҜҜпјҡCHANGELOG.md дёӯжңӘжүҫеҲ° ${TAG_NAME} зҡ„еҸ‘еёғиҜҙжҳҺ"
            exit 1
          fi

          echo "вң… е·ІжҸҗеҸ– ${TAG_NAME} зҡ„зӢ¬з«ӢеҸ‘еёғиҜҙжҳҺ"

      - name: еҸ‘еёғеҲ° npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: еҲӣе»ә GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Curated, user-facing notes only. Auto-generation is OFF so internal
          # commit titles (infra/telemetry/etc.) are never surfaced publicly.
          # The extraction step selects only the section matching the current tag.
          body_path: /tmp/release-notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: и§ҰеҸ‘ Gitee Release еҗҢжӯҘ
        run: gh workflow run sync-releases-to-gitee.yml --ref main -f tag_name="${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: еҸ‘еёғжҲҗеҠҹйҖҡзҹҘ
        if: success()
        run: |
          echo "рҹҺү жҲҗеҠҹеҸ‘еёғ ${{ github.ref_name }} еҲ° npm"
          echo "рҹ“Ұ npm: https://www.npmjs.com/package/hydro-ai-helper"
          echo "рҹҸ·пёҸ GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

      - name: еҸ‘еёғеӨұиҙҘйҖҡзҹҘ
        if: failure()
        run: |
          echo "вқҢ еҸ‘еёғеӨұиҙҘпјҢиҜ·жЈҖжҹҘж—Ҙеҝ—"
          echo "еҸҜиғҪзҡ„еҺҹеӣ пјҡ"
          echo "1. NPM_TOKEN жңӘй…ҚзҪ®жҲ–е·ІиҝҮжңҹ"
          echo "2. зүҲжң¬еҸ·дёҺ package.json дёҚдёҖиҮҙ"
          echo "3. npm еҢ…еҗҚе·Іиў«еҚ з”Ё"
